name: Build container images

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    name: Verify code, migrations and deployment scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test, including Kubernetes update safety tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check Drizzle migrations
        run: pnpm --filter @kaoyan/api exec drizzle-kit check --config drizzle.config.ts

  images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: apps/api/Dockerfile
          - component: web
            dockerfile: apps/web/Dockerfile
          - component: backup
            dockerfile: docker/backup/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build date
        id: build
        shell: bash
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/monsoonr/kaoyan-pomodoro-${{ matrix.component }}:sha-${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.build.outputs.date }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
