services:
  caddy:
    environment:
      DOMAIN: localhost
      CADDY_EMAIL: test@example.invalid
    ports: !override
      - "127.0.0.1:${TEST_HTTP_PORT:-18080}:80"
      - "127.0.0.1:${TEST_HTTPS_PORT:-18443}:443"
    volumes: !override
      - ./Caddyfile.test:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_DIR}:/data
      - ${CADDY_CONFIG_DIR}:/config
  api:
    environment:
      APP_ORIGIN: https://localhost:${TEST_HTTPS_PORT:-18443}
  backup:
    healthcheck:
      test: ["CMD-SHELL", "find /tmp -maxdepth 1 -name backup-healthy -mmin -2880 -print -quit | grep -q ."]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 2m
