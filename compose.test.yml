services:
  caddy:
    environment:
      DOMAIN: localhost
      CADDY_EMAIL: test@example.invalid
    ports: !override
      - "127.0.0.1:${TEST_HTTP_PORT:-18080}:80"
      - "127.0.0.1:${TEST_HTTPS_PORT:-18443}:443"
    volumes: !override
      - ./Caddyfile.test:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_DIR}:/data
      - ${CADDY_CONFIG_DIR}:/config
  api:
    environment:
      APP_ORIGIN: https://localhost:${TEST_HTTPS_PORT:-18443}
