x-logging: &bounded-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &security
  read_only: true
  init: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  caddy:
    image: caddy:2.10.2-alpine
    user: "1000:1000"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      CADDY_EMAIL: ${CADDY_EMAIL:?set CADDY_EMAIL in .env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_DIR:-./caddy-data}:/data
      - ${CADDY_CONFIG_DIR:-./caddy-config}:/config
    networks:
      - edge
      - backend
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_add:
      - NET_BIND_SERVICE
    <<: *security
    logging: *bounded-logging

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VCS_REF: ${IMAGE_VERSION:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: kaoyan-pomodoro-web:${IMAGE_TAG:-local}
    user: "10002:10002"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    tmpfs:
      - /tmp:size=16m,mode=1777
    <<: *security
    logging: *bounded-logging

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        VCS_REF: ${IMAGE_VERSION:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: kaoyan-pomodoro-api:${IMAGE_TAG:-local}
    user: "10001:10001"
    environment:
      APP_ORIGIN: ${APP_ORIGIN:?set APP_ORIGIN in .env}
      DATABASE_PATH: /var/lib/kaoyan/kaoyan.sqlite
      HOST: 0.0.0.0
      PORT: 3000
      TRUST_PROXY_HOPS: 1
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${DATA_DIR:-./data}:/var/lib/kaoyan
    networks:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    tmpfs:
      - /tmp:size=32m,mode=1777
    <<: *security
    logging: *bounded-logging

  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
      args:
        VCS_REF: ${IMAGE_VERSION:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: kaoyan-pomodoro-backup:${IMAGE_TAG:-local}
    user: "10001:10001"
    environment:
      DATABASE_PATH: /var/lib/kaoyan/kaoyan.sqlite
      BACKUP_DIR: /backups
      BACKUP_HOUR: ${BACKUP_HOUR:-3}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${DATA_DIR:-./data}:/var/lib/kaoyan
      - ${BACKUP_DIR:-./backups}:/backups
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "test ! -f $$DATABASE_PATH || find /tmp -maxdepth 1 -name backup-healthy -mmin -2880 -print -quit | grep -q ."]
      interval: 1h
      timeout: 5s
      retries: 3
      start_period: 2m
    tmpfs:
      - /tmp:size=128m,mode=1777
    <<: *security
    logging: *bounded-logging

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true
